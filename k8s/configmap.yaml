apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-config
  namespace: ecommerce
data:
  DEBUG: "False"
  ALLOWED_HOSTS: "*"
  CORS_ALLOWED_ORIGINS: "http://localhost:3000"
  POSTGRES_DB: "ecommerce"
  POSTGRES_USER: "ecommerce_user"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  VITE_API_BASE_URL: "/api"
