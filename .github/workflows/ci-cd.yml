name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/ecommerce-frontend

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ecommerce_test
          POSTGRES_USER: ecommerce_user
          POSTGRES_PASSWORD: ecommerce_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecommerce_user -d ecommerce_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python manage.py test
        env:
          DEBUG: "False"
          SECRET_KEY: test-secret
          ALLOWED_HOSTS: localhost
          POSTGRES_DB: ecommerce_test
          POSTGRES_USER: ecommerce_user
          POSTGRES_PASSWORD: ecommerce_password
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm test
      - run: npm run build

  build-and-push:
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Hub credentials
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "Missing Docker Hub credentials."
            echo "Add DOCKERHUB_USERNAME and DOCKERHUB_TOKEN in GitHub repo Settings > Secrets and variables > Actions."
            exit 1
          fi
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ github.sha }},${{ env.BACKEND_IMAGE }}:latest
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }},${{ env.FRONTEND_IMAGE }}:latest

  deploy:
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Validate Kubernetes credentials
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "Missing Kubernetes credentials."
            echo "Add KUBE_CONFIG as a base64-encoded kubeconfig in GitHub repo Settings > Secrets and variables > Actions."
            exit 1
          fi
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
      - name: Deploy manifests
        run: |
          sed -i "s|your-dockerhub-username/ecommerce-backend:latest|${{ env.BACKEND_IMAGE }}:${{ github.sha }}|g" k8s/backend-deployment.yaml
          sed -i "s|your-dockerhub-username/ecommerce-backend:latest|${{ env.BACKEND_IMAGE }}:${{ github.sha }}|g" k8s/seed-products-job.yaml
          sed -i "s|your-dockerhub-username/ecommerce-frontend:latest|${{ env.FRONTEND_IMAGE }}:${{ github.sha }}|g" k8s/frontend-deployment.yaml
          kubectl apply -k k8s
          kubectl rollout status deployment/backend -n ecommerce
          kubectl rollout status deployment/frontend -n ecommerce
